- type: entity
  parent:
  - AppearanceApid
  - BaseSpeciesMobOrganic
  id: MobApid
  name: Urist McBzzsz
  components:
  - type: Damageable
    damageModifierSet: Moth
  - type: Speech
    speechVerb: Moth
    allowedEmotes: ['Chitter', 'Squeak', 'Flap']
  - type: TypingIndicator
    proto: apid
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: InsectBlood
        Quantity: 300
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: _MACRO/Mobs/Effects/apid_brute_damage.rsi # technically this is only brute sprites for the chest. but that doesn't matter
        color: "#808A51"
  - type: MothAccent
  - type: Vocal
    sounds:
      Male: UnisexMoth
      Female: UnisexMoth
      Unsexed: UnisexMoth
  - type: BodyEmotes
    soundsId: MothBodyEmotes

  - type: MobThresholds
    thresholds:
      0: Alive
      60: Critical
      125: Dead
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage # Moths hate the heat and thrive in the cold.
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 # per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 3 # per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      289: 0.9
      275: 0.8
      250: 0.7
  - type: MovementSpeedModifier
    baseWeightlessFriction: 0.2
    baseWeightlessModifier: 1
    baseSprintSpeed: 5.5
    baseWalkSpeed: 3.5
    acceleration: 1.2 # zoom
  - type: MovementIgnoreGravity # nyoom
    weightless: true
  - type: MeleeWeapon
    attackRate: 1
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcThrust
    damage:
      types:
        Shock: 3 # they got a little stinger
  - type: StaminaDamageOnHit # this is just kinda fun.
    damage: 18
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Monkey_burning
  - type: Tag
    tags:
    - VimPilot
    - DoorBumpOpener
    - AnomalyHost
    - CanPilot
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 75
        restitution: 0.0
        mask:
        - CrateMask # this is so they can fly over tables and through plastic flaps
        layer:
        - MobLayer
  - type: Physics
    bodyStatus: InAir
  - type: NoSlip
  - type: CanMoveInAir
  - type: CanWieldOneHanded

