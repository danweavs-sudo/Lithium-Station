# Funky Duo Emotes entity
- type: entity
  id: FunkyEffectDuoEmoteBase
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 11.0
  - type: Sprite
    offset: 0, 0.65
    sprite: _Funkystation/Effects/duo_emotes.rsi
    noRot: true
    drawdepth: Effects
    layers:
    - shader: unshaded
      map: [ "emote" ]
  - type: EffectVisuals
  - type: Tag
    tags:
    - HideContextMenu

# Define actually new emotes down here.
# Fist Bump
- type: duoEmote
  id: Fistbump
  name: duo-emote-fistbump-perform
  icon:
    sprite: _Funkystation/Effects/duo_emotes.rsi
    state: icon-fistbump
  effectSprite:
    sprite: _Funkystation/Effects/duo_emotes.rsi
    state: effect-fistbump
  sound:
    path: /Audio/Effects/weak_hit1.ogg
    params:
      variation: 0.05
  attemptSelf: duo-emote-fistbump-attempt-self
  attemptOthers: duo-emote-fistbump-attempt
  performSelf: duo-emote-fistbump-self
  performOthers: duo-emote-fistbump

